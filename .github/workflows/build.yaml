name: Build
on: [push, pull_request]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
      options: --privileged
    strategy:
      # this lets us run the job against all images to completion
      fail-fast: false
      matrix:
        image:
        - snaipe/ci-meson:gcc-debian-10
        - alpine:3.23
        - snaipe/ci-meson:gcc-fedora-31
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - name: make
        run: |
          set -xeu
          command -v apk && apk add --no-cache linux-headers scdoc gcc musl-dev make meson ninja pkgconf libcap-dev libcap-setcap gawk git jq util-linux iproute2
          command -v apt && apt-get update && apt-get install -y scdoc
          command -v dnf && dnf install -y glibc-static scdoc
          CPPFLAGS='-Wconversion -pedantic-errors' meson build -Dsuid-fallback=true
          ninja -C build
          ninja -C build install
          echo "root:100000:65534" >> /etc/subuid
          echo "root:100000:65534" >> /etc/subgid
          meson test -C build --print-errorlogs

